<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <style>
    body {font-family: sans-serif; max-width: 800px; margin: auto;}
    .product {border:1px solid #ccc; padding:10px; margin:10px; display:inline-block; width:200px; text-align:center;}
    img {width:150px; height:150px; object-fit: cover;}
    button {padding:5px 10px; margin-top:5px;}
  </style>
</head>
<body>
  <h1>Products</h1>
  <div id="product-list"></div>
  <a href="checkout.html">Go to Checkout</a>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');

    // JSON থেকে প্রডাক্ট লোড
    fetch('products.json')
      .then(res => res.json())
      .then(products => {
        const container = document.getElementById('product-list');
        products.forEach(p => {
          container.innerHTML += `
            <div class="product" data-name="${p.name}" data-price="${p.price}">
              <img src="${p.image}" alt="${p.name}">
              <h3>${p.name}</h3>
              <p>${p.description}</p>
              <p>Price: ${p.price}৳</p>
              <button class="add-to-cart">Add to Cart</button>
            </div>
          `;
        });

        // Add to Cart বাটন লজিক
        document.querySelectorAll('.add-to-cart').forEach(btn => {
          btn.addEventListener('click', e => {
            const product = e.target.closest('.product');
            cart.push({
              name: product.dataset.name,
              price: parseFloat(product.dataset.price),
              qty: 1
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(product.dataset.name + ' added to cart');
          });
        });
      });
  </script>
</body>
</html>
