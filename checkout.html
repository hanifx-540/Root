<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    body {font-family: sans-serif; max-width:400px; margin:auto;}
    label, input, textarea, button {display:block; width:100%; margin-top:10px;}
  </style>
</head>
<body>
  <h1>Checkout (COD)</h1>

  <div id="cart"></div>

  <form id="checkoutForm">
    <input type="text" name="customer_name" placeholder="আপনার নাম" required>
    <input type="email" name="customer_email" placeholder="আপনার ইমেইল" required>
    <input type="text" name="phone" placeholder="ফোন নম্বর" required>
    <textarea name="address" placeholder="ঠিকানা" required></textarea>
    <input type="hidden" name="payment_method" value="COD">
    <button type="submit">অর্ডার দিন</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    emailjs.init("FGfcctzHQo1oL78Zh"); // Public Key

    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const cartDiv = document.getElementById('cart');

    if(cart.length === 0){
      cartDiv.innerHTML = '<p>Cart is empty!</p>';
    } else {
      let html = '<h3>Your Cart</h3>';
      let total = 0;
      cart.forEach(i => {
        html += `<p>${i.name} x ${i.qty} = ${i.price*i.qty}৳</p>`;
        total += i.price*i.qty;
      });
      html += `<p><strong>Total: ${total}৳</strong></p>`;
      cartDiv.innerHTML = html;
    }

    document.getElementById('checkoutForm').addEventListener('submit', function(e){
      e.preventDefault();
      if(cart.length === 0){
        alert('Cart is empty!');
        return;
      }

      const form = e.target;
      const items = JSON.stringify(cart);
      const total_amount = cart.reduce((sum,i)=>sum+i.price*i.qty,0);

      // EmailJS Send
      emailjs.sendForm('service_bwpm7gt', 'template_dou7wq4', this)
        .then(function() {
          alert('অর্ডার পাঠানো হয়েছে! আমরা শিগগিরই যোগাযোগ করব।');
          localStorage.removeItem('cart'); // Cart clear
          form.reset();
        }, function(error) {
          alert('Error: ' + JSON.stringify(error));
        });
    });
  </script>
</body>
</html>
